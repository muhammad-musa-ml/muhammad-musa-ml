<svg viewBox="0 0 1200 230" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Muhammad Musa — LLM security researcher, agent-systems builder, founder">
  <!-- constellation (right side) -->
  <g stroke="#0891b2" stroke-opacity="0.18" stroke-width="1">
    <line x1="920" y1="60" x2="1000" y2="36"/>
    <line x1="1000" y1="36" x2="1084" y2="70"/>
    <line x1="1084" y1="70" x2="1148" y2="44"/>
    <line x1="920" y1="60" x2="962" y2="128"/>
    <line x1="962" y1="128" x2="1044" y2="112"/>
    <line x1="1084" y1="70" x2="1044" y2="112"/>
    <line x1="1044" y1="112" x2="1120" y2="150"/>
    <line x1="1120" y1="150" x2="1148" y2="44"/>
    <line x1="962" y1="128" x2="936" y2="190"/>
    <line x1="936" y1="190" x2="1022" y2="200"/>
    <line x1="1022" y1="200" x2="1120" y2="150"/>
    <line x1="1044" y1="112" x2="1022" y2="200"/>
    <line x1="860" y1="110" x2="920" y2="60"/>
    <line x1="860" y1="110" x2="962" y2="128"/>
  </g>
  <g fill="#0891b2">
    <circle cx="920" cy="60" r="3" fill-opacity="0.7"/>
    <circle cx="1000" cy="36" r="2.2" fill-opacity="0.45"/>
    <circle cx="1084" cy="70" r="3.4" fill-opacity="0.75"/>
    <circle cx="1148" cy="44" r="2" fill-opacity="0.4"/>
    <circle cx="962" cy="128" r="2.6" fill-opacity="0.55"/>
    <circle cx="1044" cy="112" r="3.8" fill-opacity="0.8"/>
    <circle cx="1120" cy="150" r="2.4" fill-opacity="0.5"/>
    <circle cx="936" cy="190" r="2.2" fill-opacity="0.45"/>
    <circle cx="1022" cy="200" r="2.8" fill-opacity="0.55"/>
    <circle cx="860" cy="110" r="2" fill-opacity="0.4"/>
  </g>
  <g fill="#6e7781">
    <circle cx="812" cy="52" r="1.6" fill-opacity="0.35"/>
    <circle cx="886" cy="164" r="1.6" fill-opacity="0.3"/>
    <circle cx="1096" cy="196" r="1.6" fill-opacity="0.3"/>
    <circle cx="1170" cy="104" r="1.6" fill-opacity="0.35"/>
  </g>

  <!-- name -->
  <text x="64" y="104" font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="-0.5" fill="#1f2328">Muhammad Musa</text>

  <!-- accent underline, draws in once -->
  <line x1="66" y1="126" x2="517" y2="126" stroke="#0891b2" stroke-width="3" stroke-linecap="round" stroke-dasharray="451" stroke-dashoffset="451">
    <animate attributeName="stroke-dashoffset" from="451" to="0" dur="0.8s" begin="0.2s" fill="freeze"/>
  </line>

  <!-- descriptor line -->
  <text x="64" y="172" font-family="Consolas, 'SFMono-Regular', Menlo, 'Liberation Mono', monospace" font-size="19" fill="#57606a">LLM security researcher <tspan fill="#c4ccd4">·</tspan> agent-systems builder <tspan fill="#c4ccd4">·</tspan> founder, <tspan fill="#0e7490">Wumi Health</tspan><tspan fill="#0891b2" font-weight="700"> ▌<animate attributeName="fill-opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.2s" repeatCount="indefinite"/></tspan></text>

</svg>
